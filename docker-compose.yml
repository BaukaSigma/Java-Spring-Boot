version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: learning_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: learning_progress_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - learning_tracker_network

  # pgAdmin (веб-интерфейс для управления БД)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: learning_tracker_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@learningtracker.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - learning_tracker_network
    depends_on:
      - postgres

  # Spring Boot Application (раскомментируйте после сборки JAR)
  # app:
  #   build: .
  #   container_name: learning_tracker_app
  #   restart: unless-stopped
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/learning_progress_tracker
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - learning_tracker_network
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
  pgadmin_data:

networks:
  learning_tracker_network:
    driver: bridge
