<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Learning Progress Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/modern-style.css">
    <script src="/js/i18n.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 50px;
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideInDown 0.6s ease-out;
        }
        .login-title {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 30px;
            text-align: center;
        }
        .lang-switcher {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 8px;
        }
        .input-group-text {
            background: var(--primary-gradient);
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Переключатель языков -->
    <div class="lang-switcher">
        <button class="lang-btn" data-lang="en" onclick="i18n.changeLanguage('en')">EN</button>
        <button class="lang-btn active" data-lang="ru" onclick="i18n.changeLanguage('ru')">RU</button>
        <button class="lang-btn" data-lang="kk" onclick="i18n.changeLanguage('kk')">KK</button>
    </div>
    
    <div class="login-container">
        <h1 class="login-title">
            <i class="bi bi-box-arrow-in-right"></i>
            <span data-i18n="auth.loginTitle">Вход в систему</span>
        </h1>

        <div id="alert-container"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label" data-i18n="auth.username">Имя пользователя</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label" data-i18n="auth.password">Пароль</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-modern w-100">
                <i class="bi bi-box-arrow-in-right"></i> Войти
            </button>
        </form>

        <hr class="my-4">

        <div class="text-center">
            <p class="mb-2">Нет аккаунта?</p>
            <a href="/register" class="btn btn-outline-primary">
                <i class="bi bi-person-plus"></i> Зарегистрироваться
            </a>
        </div>

        <div class="text-center mt-3">
            <a href="/" class="text-muted">
                <i class="bi bi-arrow-left"></i> На главную
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alert-container');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Сохраняем токен
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    
                    alertContainer.innerHTML = `
                        <div class="alert alert-success">
                            <i class="bi bi-check-circle"></i> Вход выполнен успешно! Перенаправление...
                        </div>
                    `;
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    alertContainer.innerHTML = `
                        <div class="alert alert-danger">
                            <i class="bi bi-x-circle"></i> ${data.message || 'Неверное имя пользователя или пароль'}
                        </div>
                    `;
                }
            } catch (error) {
                alertContainer.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-x-circle"></i> Ошибка подключения к серверу
                    </div>
                `;
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
