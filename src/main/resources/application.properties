# ==========================================
# LEARNING PROGRESS TRACKER - CONFIGURATION
# ==========================================

spring.application.name=learning-progress-tracker

# ==========================================
# DATABASE CONFIGURATION (PostgreSQL)
# ==========================================
# ВАЖНО: Измените username и password на свои!
spring.datasource.url=jdbc:postgresql://localhost:5432/learning_progress_tracker
spring.datasource.username=postgres
spring.datasource.password=123123
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
# update - обновляет схему при изменениях (для разработки)
# create - пересоздает схему каждый раз (ОСТОРОЖНО!)
# validate - только проверяет схему
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================================
# FLYWAY MIGRATION
# ==========================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ==========================================
# JWT CONFIGURATION
# ==========================================
# ВАЖНО: Измените этот секретный ключ на свой уникальный!
# Минимум 256 бит (32 символа)
jwt.secret=MyVerySecretKeyForJWTTokenGeneration2024LearningProgressTracker12345
jwt.expiration=86400000
# 86400000 ms = 24 часа

# ==========================================
# INTERNATIONALIZATION (i18n)
# ==========================================
# Поддержка русского, казахского и английского языков
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.web.locale=ru
spring.web.locale-resolver=fixed

# ==========================================
# THYMELEAF CONFIGURATION
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ==========================================
# LOGGING
# ==========================================
logging.level.root=INFO
logging.level.com.learningtracker=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==========================================
# FILE UPLOAD (если понадобится)
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
